[tox]
envlist = py3{10,11,12,13,14}

[testenv]
usedevelop = True
pip_pre = True
passenv =
  CFLAGS
  CPPFLAGS
  INCLUDE
  LDFLAGS
  LIB
deps =
  build
  setuptools >= 74.1.0
  wheel
commands =
  python -m build --no-isolation --outdir=dist --wheel
  python -m pip install --find-links=dist --no-index libesedb-python
  python tests/runtests.py
