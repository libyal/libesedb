# Build packages from source.
name: build_package
on:
  pull_request:
  push:
permissions: read-all
jobs:
  build_dpkg:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['26.04']
    container:
      image: ubuntu:${{ matrix.version }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up container
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt update -q
        apt install -y libterm-readline-gnu-perl locales software-properties-common
        locale-gen en_US.UTF-8
        ln -f -s /usr/share/zoneinfo/UTC /etc/localtime
    - name: Install build dependencies
      run: |
        apt update -q
        apt install -y autoconf automake autopoint autotools-dev build-essential debhelper dh-autoreconf dh-python fakeroot git libtool pkg-config python3-dev python3-setuptools
    - name: Download test data
      run: |
        if test -x "synctestdata.sh"; then ./synctestdata.sh; fi
    - name: Build from source
      run: |
        ./synclibs.sh --use-head
        ./autogen.sh
        ./configure
        make dist
    - name: Build dpkg
      run: |
        PACKAGE=`ls -1 *.tar.gz | head -n1`
        PACKAGE_ORIG=`echo "${PACKAGE%.tar.gz}.orig.tar.gz" | tr '-' '_'`
        mv "${PACKAGE}" "../${PACKAGE_ORIG}"
        cp -rf dpkg debian
        dpkg-buildpackage -rfakeroot
  build_rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['44']
    container:
      image: registry.fedoraproject.org/fedora:${{ matrix.version }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up container
      run: |
        dnf install -y dnf-plugins-core langpacks-en
    - name: Install build dependencies
      run: |
        dnf install -y @development-tools autoconf automake gettext-devel git libtool make pkg-config python3-devel python3-setuptools rpm-build
    - name: Download test data
      run: |
        if test -x "synctestdata.sh"; then ./synctestdata.sh; fi
    - name: Build from source
      run: |
        ./synclibs.sh --use-head
        ./autogen.sh
        ./configure
        make dist
    - name: Build rpm
      run: |
        PACKAGE=`ls -1 *.tar.gz | head -n1`
        rpmbuild -ta "${PACKAGE}"
  build_pkg:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - os: macos-26
          configure_options: ''
    steps:
    - uses: actions/checkout@v6
    - name: Install build dependencies
      run: |
        brew update -q
        brew install -q autoconf automake gettext gnu-sed libtool pkg-config || true
        ln -s /usr/local/bin/glibtoolize /usr/local/bin/libtoolize
    - name: Download test data
      run: |
        if test -x "synctestdata.sh"; then ./synctestdata.sh; fi
    - name: Build from source
      run: |
        ./synclibs.sh --use-head
        ./autogen.sh
        ./configure --disable-dependency-tracking --prefix=/usr/local --with-pyprefix ${{ matrix.configure_options }}
        make -j4 > /dev/null
    - name: Build pkg
      run: |
        tests/pkgbuild.sh
