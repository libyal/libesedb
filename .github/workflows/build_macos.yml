# Build from source on Mac OS.
name: build_macos
on:
  pull_request:
  push:
permissions: read-all
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - os: macos-14
          compiler: 'clang'
          configure_options: ''
        - os: macos-15
          compiler: 'clang'
          configure_options: ''
        - os: macos-26
          compiler: 'clang'
          configure_options: ''
        - os: macos-26
          compiler: 'gcc'
          configure_options: ''
        - os: macos-26-intel
          compiler: 'clang'
          configure_options: ''
    steps:
    - uses: actions/checkout@v6
    - name: Install build dependencies
      run: |
        brew update -q
        brew install -q autoconf automake gettext gnu-sed libtool pkg-config || true
        ln -s /usr/local/bin/glibtoolize /usr/local/bin/libtoolize
    - name: Download test data
      run: |
        if test -x "synctestdata.sh"; then ./synctestdata.sh; fi
    - name: Build from source
      env:
        CC: ${{ matrix.compiler }}
      run: |
        ./synclibs.sh --use-head
        ./autogen.sh
        ./configure ${{ matrix.configure_options }}
        make -j4 > /dev/null
    - name: Run tests
      run: |
        tests/runtests.sh -j4 VERBOSE=1
  build_python:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - os: macos-26
          compiler: 'gcc'
          configure_options: '--enable-python'
    steps:
    - uses: actions/checkout@v6
    - name: Install build dependencies
      run: |
        brew update -q
        brew install -q autoconf automake gettext gnu-sed libtool pkg-config || true
        ln -s /usr/local/bin/glibtoolize /usr/local/bin/libtoolize
    - name: Download test data
      run: |
        if test -x "synctestdata.sh"; then ./synctestdata.sh; fi
    - name: Build from source
      env:
        CC: ${{ matrix.compiler }}
      run: |
        ./synclibs.sh --use-head
        ./autogen.sh
        ./configure ${{ matrix.configure_options }}
        make -j4 > /dev/null
    - name: Run tests
      run: |
        tests/runtests.sh -j4 VERBOSE=1
  build_pkgbuild:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - os: macos-26
          compiler: 'clang'
          configure_options: '--disable-dependency-tracking --prefix=/usr/local --with-pyprefix'
    steps:
    - uses: actions/checkout@v6
    - name: Install build dependencies
      run: |
        brew update -q
        brew install -q autoconf automake gettext gnu-sed libtool pkg-config || true
        ln -s /usr/local/bin/glibtoolize /usr/local/bin/libtoolize
    - name: Download test data
      run: |
        if test -x "synctestdata.sh"; then ./synctestdata.sh; fi
    - name: Build from source
      env:
        CC: ${{ matrix.compiler }}
      run: |
        ./synclibs.sh --use-head
        ./autogen.sh
        ./configure ${{ matrix.configure_options }}
        make -j4 > /dev/null
    - name: Build pkg
      run: |
        tests/pkgbuild.sh
